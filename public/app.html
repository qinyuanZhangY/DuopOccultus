<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>DuopOccultus 学习端</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="cinema-page">
    <main class="phone-shell">
      <header class="topbar">
        <div>
          <h1>DuopOccultus</h1>
          <p class="muted">神秘学路径学习</p>
        </div>
        <button id="logoutBtn" class="secondary-btn small-btn hidden">退出</button>
      </header>

      <section id="authView" class="card">
        <h2>登录 / 注册</h2>
        <p class="muted">支持用户名密码登录。示例账号：demo / demo123</p>
        <form id="authForm" class="stack-form">
          <input id="usernameInput" type="text" placeholder="用户名（3-20字符）" required />
          <input id="passwordInput" type="password" placeholder="密码（至少6位）" required />
          <div class="button-row">
            <button type="submit" class="primary-btn">登录</button>
            <button type="button" id="registerBtn" class="secondary-btn">注册</button>
          </div>
        </form>
        <p id="authMessage" class="message"></p>
      </section>

      <section id="courseView" class="hidden stack">
        <article class="card">
          <div class="row-between">
            <h2 id="welcomeTitle">欢迎</h2>
            <span class="xp-pill">XP: <strong id="xpValue">0</strong></span>
          </div>
          <p id="disclaimerText" class="disclaimer"></p>
        </article>
        <article class="card">
          <h3>课程选择</h3>
          <div id="courseTabs" class="course-tabs"></div>
          <p id="resumeHint" class="muted"></p>
        </article>
      </section>

      <section id="pathView" class="hidden stack">
        <article class="card">
          <div class="row-between">
            <h3 id="pathCourseTitle">路径图</h3>
            <button id="changeCourseBtn" class="secondary-btn small-btn">切换课程</button>
          </div>
          <p id="pathCourseMeta" class="muted"></p>
          <div id="pathTimeline" class="path-timeline"></div>
        </article>
      </section>

      <section id="contentView" class="hidden stack">
        <article class="card">
          <div class="row-between">
            <h3 id="pointTitle"></h3>
            <button id="backToPathBtn" class="secondary-btn small-btn">返回路径图</button>
          </div>
          <p id="pointMeta" class="muted"></p>
          <div id="pointCover" class="cover-placeholder"></div>
          <img id="pointImage" class="point-image hidden" alt="课程插图" />
          <div id="pointConcept" class="concept-content"></div>
          <button id="startQuizBtn" class="primary-btn">开始本课答题</button>
        </article>
      </section>

      <section id="quizView" class="hidden stack">
        <article class="card">
          <div class="row-between">
            <h3 id="quizProgress"></h3>
            <span id="quizTypeTag" class="type-tag"></span>
          </div>
          <p id="quizPrompt" class="question-prompt"></p>
          <div id="quizBody"></div>
          <p id="quizFeedback" class="message"></p>
          <div class="button-row">
            <button id="submitAnswerBtn" class="primary-btn">提交本题</button>
            <button id="nextQuestionBtn" class="primary-btn hidden">下一题</button>
          </div>
        </article>
      </section>

      <section id="finishView" class="hidden">
        <article class="card">
          <h3>路径点完成</h3>
          <p id="finishText"></p>
          <p id="finishXp"></p>
          <div class="button-row">
            <button id="continuePathBtn" class="primary-btn">进入下一路径点</button>
            <button id="backToPathFromFinishBtn" class="secondary-btn">回路径图</button>
          </div>
        </article>
      </section>
    </main>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
